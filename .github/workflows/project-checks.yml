name: Project checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci --prefix functions
      - run: npm run check

  database-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci --prefix functions
      - run: npx --yes firebase-tools@15.16.0 emulators:exec --only database "npm --prefix functions run test:rules" --project box-chain-arena-rules-test
